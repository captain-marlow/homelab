- name: Deploy Ollama stack into CT172
  hosts: proxmox
  gather_facts: false

  # Idempotent (re)deploy of the Ollama compose file into CT172 /config.
  # Run provision_ollama_lxc.yml first (creates the LXC + Docker + the /config/models dataset).
  # No .env or one-shot config step is needed — Ollama is stateless config-wise; models
  # live on the /config/models ZFS-backed volume.

  vars:
    ct_id: 172

    # compose file path (relative to ansible/ directory)
    local_compose_path: "{{ playbook_dir }}/../../ollama/docker-compose.yml"
    staged_compose_path: "/tmp/ollama-docker-compose.yml"
    ct_compose_path: "/config/docker-compose.yml"

  tasks:
    - name: Verify local compose exists (control node)
      delegate_to: localhost
      run_once: true
      stat:
        path: "{{ local_compose_path }}"
      register: compose_stat

    - name: Fail if local compose missing
      delegate_to: localhost
      run_once: true
      fail:
        msg: "Local compose file not found: {{ local_compose_path }}"
      when: not compose_stat.stat.exists

    - name: Ensure /config/models exists in CT (model store)
      shell: |
        set -euo pipefail
        pct exec {{ ct_id }} -- bash -lc 'mkdir -p /config/models'
      args:
        executable: /bin/bash

    - name: Upload compose to Proxmox host staging path
      copy:
        src: "{{ local_compose_path }}"
        dest: "{{ staged_compose_path }}"
        mode: "0644"

    - name: Push compose from Proxmox host into CT172 /config (and verify)
      shell: |
        set -euo pipefail
        pct push {{ ct_id }} "{{ staged_compose_path }}" "{{ ct_compose_path }}"
        pct exec {{ ct_id }} -- bash -lc 'ls -la {{ ct_compose_path }} && head -n 5 {{ ct_compose_path }}'
      args:
        executable: /bin/bash

    - name: Bring up Ollama stack
      shell: |
        set -euo pipefail
        pct exec {{ ct_id }} -- bash -lc '
          set -euo pipefail
          test -f /config/docker-compose.yml
          docker compose -f /config/docker-compose.yml pull
          docker compose -f /config/docker-compose.yml up -d
          docker ps
        '
      args:
        executable: /bin/bash
